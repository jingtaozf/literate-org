# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Usage
# - pip install pre-commit black flake8
# - pre-commit install
# - pre-commit run --all-files       # test all locally
# - make secret-scan                 # one-shot full-history secret scan (gitleaks)
repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black --check
        language: system
        files: \.py$
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        files: \.py$
      # Structural lint for literate-org.org: depth, no grab-bag, prose-first.
      # Re-runs the whole-file check whenever any .org changes. The script
      # decides which file to lint via its DEFAULT_TARGET.
      - id: check-structure
        name: check-structure
        entry: python3 scripts/check_org_structure.py
        language: system
        files: \.org$
        pass_filenames: false
      # NL-outline lint: flags long Python functions without `# # ` partition
      # comments. Runs on .py changes (the tangle output we ship).
      - id: check-nl-outline
        name: check-nl-outline
        entry: python3 scripts/check_nl_outline.py
        language: system
        files: \.py$
        pass_filenames: false
      # Dead-code lint via vulture. Configured in [tool.vulture] in
      # pyproject.toml; the smoke test (commit 79ec480) verified it
      # catches a fresh top-level dead function at 60% confidence.
      - id: check-dead-code
        name: check-dead-code
        entry: poetry run vulture
        language: system
        files: \.py$
        pass_filenames: false
  # Per-commit secret scan. The pre-commit framework downloads gitleaks
  # automatically on first run, so no system install is required.
  # Full git-history scan is done via `make secret-scan`.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
