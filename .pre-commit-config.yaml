# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Usage
# - pip install pre-commit black flake8
# - pre-commit install
# - pre-commit run --all-files       # test all locally
# - make secret-scan                 # one-shot full-history secret scan (gitleaks)
repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black --check
        language: system
        files: \.py$
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        files: \.py$
  # Per-commit secret scan. The pre-commit framework downloads gitleaks
  # automatically on first run, so no system install is required.
  # Full git-history scan is done via `make secret-scan`.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
